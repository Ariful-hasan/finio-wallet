services:
    # 1. Nginx Web Server
    web:
        image: nginx:alpine
        container_name: graph-forge-web
        restart: unless-stopped
        ports:
            - "${HTTP_PORT:-8000}:80"
        depends_on:
            app:
                condition: service_healthy
        environment:
            - PHP_FPM_NGINX_MAX_REQUESTS
            - PHP_FPM_PORT
            - HTTP_PORT
        volumes:
            - .:/var/www/html
            - ./docker/nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
        networks:
            - finio-network

    # 2. PHP-FPM Application
    app:
        build:
            context: .
            dockerfile: docker/Dockerfile
            args:
                - USER_ID=${USER_ID}
                - GROUP_ID=${GROUP_ID}
        image: finio-app:latest
        container_name: finio-app
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
        volumes:
            - .:/var/www/html
        networks:
            - finio-network
        environment:
            - APP_ENV
            - APP_DEBUG
            - DB_HOST
            - DB_CONNECTION
            - DB_PORT
            - DB_DATABASE
            - DB_USERNAME
            - DB_PASSWORD
            - REDIS_HOST
            - REDIS_PASSWORD
            - REDIS_PORT
            - PHP_FPM_MAX_CHILDREN
            - PHP_FPM_MAX_REQUESTS
            - PHP_FPM_PORT
            - PHP_FPM_NGINX_MAX_REQUESTS
            - PHP_OPCACHE_VALIDATE_TIMESTAMPS
            - PHP_OPCACHE_REVALIDATE_FREQ
        healthcheck:
            test: ["CMD", "cgi-fcgi", "-bind", "-connect", "127.0.0.1:${PHP_FPM_PORT}"]
            interval: 5s
            timeout: 3s
            retries: 5
            start_period: 30s

    # 3. MySQL Database
    db:
        image: 'mysql:8.0'
        container_name: finio-db
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_DATABASE: '${DB_DATABASE}'
        ports:
            - "${DB_PORT:-3306}:3306"
        volumes:
            - 'finio-mysql:/var/lib/mysql'
        networks:
            - finio-network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 10s
            timeout: 5s
            retries: 5


networks:
    finio-network:
        driver: bridge

volumes:
    finio-mysql:
        driver: local
